name: Keep Render Alive

on:
  schedule:
    # every 5 minutes
    - cron: '*/5 * * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check KEEPALIVE_URL secret
        run: |
          if [ -z "${{ secrets.KEEPALIVE_URL }}" ]; then
            echo "KEEPALIVE_URL not set — set repository secret KEEPALIVE_URL to your app URL to enable pings.";
            exit 0;
          fi

      - name: Ping app URL
        run: |
          echo "Pinging ${{ secrets.KEEPALIVE_URL }}"
          curl --max-time 10 -sSfL "${{ secrets.KEEPALIVE_URL }}" -o /dev/null || echo "Ping failed"
